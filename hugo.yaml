baseURL: "https://www.lynneredteamlog.tech/"
locale: "en-us"
title: "AI Red Team Log"
theme: "PaperMod"

pagination:
  pagerSize: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true

params:
  env: production
  title: "AI Red Team Log"
  description: "Learning log and project portfolio — AI Red Teaming, prompt injection, RAG security, and offensive security notes."
  keywords: [AI Security, Red Team, Prompt Injection, RAG, LLM Security]
  author: "Lynne Lin"
  defaultTheme: auto
  disableThemeToggle: false
  ShowShareButtons: false
  ShowReadingTime: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  homeInfoParams:
    Title: "Hi, I'm Lynne 👋"
    Content: >
      I'm learning AI Red Teaming — prompt injection, RAG pipeline security,
      agentic system attacks, and adversarial ML. This site is my public
      learning log and project portfolio as I work toward a career in
      offensive AI security.

  socialIcons:
    - name: github
      url: "https://github.com/LynneYao666"
    - name: linkedin
      url: "https://www.linkedin.com/in/lynne-y-520349185/"
    - name: rss
      url: "index.xml"

  editPost:
    URL: ""
    Text: ""
    appendFilePath: false

  assets:
    disableHLJS: true

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

menu:
  main:
    - identifier: learning-log
      name: Learning Log
      url: /learning-log/
      weight: 10
    - identifier: projects
      name: Projects
      url: /projects/
      weight: 20
    - identifier: notes
      name: Notes
      url: /notes/
      weight: 30
    - identifier: about
      name: About
      url: /about/
      weight: 40
    - identifier: search
      name: Search
      url: /search/
      weight: 50

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: false
    style: monokai
